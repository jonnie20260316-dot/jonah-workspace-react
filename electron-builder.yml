appId: com.jonnie.jonahworkspace
productName: Jonah Workspace
copyright: Copyright © 2026 Jonnie

directories:
  output: release/
  buildResources: build/

files:
  - dist/**
  - electron/**
  - package.json
  - node_modules/**
  - youtube-credentials.json
  - dev-app-update.yml
  - "!src/**"
  - "!*.md"

mac:
  artifactName: jonah-workspace-${version}-${arch}-mac.${ext}
  identity: "${env.ELECTRON_MAC_IDENTITY}"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  category: public.app-category.productivity
  darkModeSupport: true
  extendInfo:
    NSMicrophoneUsageDescription: "Jonah Workspace needs microphone access for voice recording."
    NSCameraUsageDescription: "Jonah Workspace needs camera access for video capture."
    NSScreenCaptureUsageDescription: "Jonah Workspace needs screen recording access for screen capture."
  notarize: true

win:
  target:
    - target: zip
      arch:
        - x64
  signAndEditExecutable: false
  # icon: build/icon.png  # temporarily disabled for Apple Silicon builds (rcedit requires Wine/x86)
  # TODO: Add back portable, nsis, and icon when building on Windows, or use Docker/CI for cross-platform builds

# nsis:  # disabled for cross-platform builds on Apple Silicon
#   oneClick: false
#   allowToChangeInstallationDirectory: true
#   createDesktopShortcut: true

publish:
  provider: github
  owner: jonnie20260316-dot
  repo: jonah-workspace-react
